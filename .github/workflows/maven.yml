name: Release

on:
  push:
    branches: ["main"]
    paths-ignore:
      - 'README.md'

permissions: write-all

jobs:

  build-and-deploy:
    uses: "OpenDonationAssistant/oda-libraries/.github/workflows/release_service.yml@master"
    secrets: inherit
    with:
      service: font-service
      version: '${{ github.RUN_NUMBER }}'
      packaging: 'jar'
